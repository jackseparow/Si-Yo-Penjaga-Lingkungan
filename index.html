<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Si Yo Penjaga Lingkungan Hidup</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef7f9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        #main-container { display: flex; gap: 20px; width: 100%; max-width: 1400px; margin-top: 20px; }
        
        /* Area Kerja Blockly */
        #blocklyDiv { height: 700px; flex: 2; border: 3px solid #2980b9; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Sidebar Visual yang Diperbesar */
        #sidebar { flex: 1.2; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 8px solid #2980b9; display: flex; flex-direction: column; }
        
        /* Visual Lingkungan Super Besar */
        #environment-preview { width: 100%; height: 400px; background: #87CEEB; border-radius: 12px; position: relative; overflow: hidden; margin-bottom: 20px; border: 3px solid #bdc3c7; box-shadow: inset 0 0 50px rgba(0,0,0,0.1); }
        
        #sky { height: 50%; width: 100%; position: relative; }
        #sea { position: absolute; bottom: 0; width: 100%; height: 50%; background: #3498db; transition: all 0.8s ease; }
        
        /* Objek-Objek Visual */
        #smoke-cloud { font-size: 80px; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); opacity: 0; transition: all 0.5s; z-index: 2; }
        #scrubber-icon { font-size: 50px; position: absolute; top: 60px; right: 20px; opacity: 0; transition: 0.5s; }
        #shell { font-size: 100px; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); transition: all 0.6s; z-index: 3; }
        #coral { font-size: 60px; position: absolute; bottom: 10px; left: 20%; opacity: 0.8; }
        #planting-icon { font-size: 50px; position: absolute; bottom: 50%; left: 10px; opacity: 0; transition: 0.5s; z-index: 4; }

        .status-box { background: #f8f9fa; padding: 20px; border-radius: 12px; text-align: left; border-left: 8px solid #2980b9; margin-bottom: 10px; }
        .ph-circle { display: inline-block; width: 60px; height: 60px; border-radius: 50%; line-height: 60px; text-align: center; color: white; font-weight: bold; font-size: 1.2em; margin-right: 15px; }
        
        button { background: #e74c3c; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

    <h2>🛡️ Si Yo Penjaga Lingkungan Hidup</h2>
    <p>Gunakan teknologi dan aksi alam untuk melawan polusi!</p>

    <div id="main-container">
        <div id="blocklyDiv"></div>

        <div id="sidebar">
            <div id="environment-preview">
                <div id="sky">
                    <div id="smoke-cloud">🌫️</div>
                    <div id="scrubber-icon">⚙️✨</div>
                    <div id="planting-icon">🌳</div>
                </div>
                <div id="sea">
                    <div id="coral">🪸</div>
                    <div id="shell">🐚</div>
                </div>
            </div>
            
            <div class="status-box">
                <div style="display: flex; align-items: center;">
                    <div id="ph-display" class="ph-circle" style="background: #2ecc71;">8.1</div>
                    <div>
                        <b id="ph-label">Laut Sehat</b><br>
                        <span id="ph-detail" style="font-size: 0.9em; color: #666;">pH Normal</span>
                    </div>
                </div>
                <hr>
                <div id="eco-message" style="font-size: 0.95em; color: #2c3e50; line-height: 1.4;">
                    Si Yo mengamati: Air laut jernih, kerang tumbuh dengan cangkang yang sangat kuat.
                </div>
            </div>

            <button onclick="resetEco()">Bersihkan Alam</button>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Sumber Polutan" colour="0">
            <block type="pollution_source"></block>
        </category>
        <category name="Aksi Si Yo" colour="120">
            <block type="prevention_tech"></block>
            <block type="natural_neutralizer"></block>
        </category>
        <category name="Siklus Hujan" colour="210">
            <block type="rain_mixer"></block>
        </category>
    </xml>

    <script>
        // --- 1. DEFINISI BLOK ---
        Blockly.defineBlocksWithJsonArray([
          {
            "type": "pollution_source",
            "message0": "Polutan: %1",
            "args0": [{
                "type": "field_dropdown", "name": "TYPE",
                "options": [
                  ["🚗 Asap Kendaraan", "5.0"],
                  ["🏭 Emisi Pabrik", "3.5"],
                  ["💨 Asap Pembangkit Listrik", "4.0"],
                  ["🔥 Pembakaran Sampah", "4.5"]
                ]
            }],
            "output": "Pollutant", "colour": 0
          },
          {
            "type": "prevention_tech",
            "message0": "Alat: %1",
            "args0": [{
                "type": "field_dropdown", "name": "TECH",
                "options": [
                  ["⚙️ Filter Cerobong (Scrubber)", "2.5"],
                  ["🚲 Jalur Sepeda", "1.5"],
                  ["🔌 Mobil Listrik", "2.0"]
                ]
            }],
            "output": "Fix", "colour": 120
          },
          {
            "type": "natural_neutralizer",
            "message0": "Alam: %1",
            "args0": [{
                "type": "field_dropdown", "name": "NATURE",
                "options": [
                  ["🌳 Tanam Pohon (Hutan)", "1.5"],
                  ["🌿 Hutan Bakau (Mangrove)", "2.0"]
                ]
            }],
            "output": "Fix", "colour": 160
          },
          {
            "type": "rain_mixer",
            "message0": "Awan Hujan %1 Polutan: %2 %3 Cegah dengan: %4",
            "args0": [
              { "type": "input_dummy" },
              { "type": "input_value", "name": "POLL", "check": "Pollutant" },
              { "type": "input_dummy" },
              { "type": "input_value", "name": "FIX", "check": "Fix" }
            ],
            "output": "Sea", "colour": 210
          }
        ]);

        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), trashcan: true });

        // --- 2. LOGIKA PENJAGA LINGKUNGAN ---
        function getEcoData(block) {
            if (!block) return null;
            
            if (block.type === 'pollution_source') {
                return { ph: parseFloat(block.getFieldValue('TYPE')), vol: 100 };
            }
            if (block.type === 'prevention_tech' || block.type === 'natural_neutralizer') {
                return { power: parseFloat(block.getFieldValue('TECH') || block.getFieldValue('NATURE')), type: block.type };
            }
            
            if (block.type === 'rain_mixer') {
                const pollData = getEcoData(block.getInputTargetBlock('POLL'));
                const fixData = getEcoData(block.getInputTargetBlock('FIX'));
                
                let basePH = 8.1; // pH Laut Alami
                let pollutantImpact = pollData ? (pollData.ph - 7) : 0; // Seberapa asam polutannya
                let fixPower = fixData ? fixData.power : 0; // Seberapa kuat pencegahannya
                
                // Rumus: pH akhir = pH Laut + (Dampak Polutan + Kekuatan Pencegahan)
                // Jika Fix > Polutan, maka dampak berkurang
                let finalPH = basePH + (pollutantImpact + fixPower);
                if (finalPH > 8.3) finalPH = 8.3; // Batas atas laut sehat
                
                return { ph: finalPH, hasPoll: !!pollData, hasFix: !!fixData, fixType: fixData ? fixData.type : null };
            }
            return null;
        }

        function updateUI(data) {
            const sea = document.getElementById('sea');
            const shell = document.getElementById('shell');
            const smoke = document.getElementById('smoke-cloud');
            const scrubber = document.getElementById('scrubber-icon');
            const planting = document.getElementById('planting-icon');
            const phCircle = document.getElementById('ph-display');
            
            const ph = data ? data.ph : 8.1;
            phCircle.innerText = ph.toFixed(1);
